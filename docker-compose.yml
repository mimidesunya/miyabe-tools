services:
  web:
    image: nginx:latest
    restart: always
    ports:
      - "8301:80"
    volumes:
      - ./app:/var/www/html
      - ./data:/var/www/data
      - ./lib:/var/www/lib
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: miyabe-tools-php-local
    restart: always
    volumes:
      - ./app:/var/www/html
      - ./data:/var/www/data
      - ./lib:/var/www/lib
      - ./src:/var/www/src
      - ./docker/php/zz-www-overrides.conf:/usr/local/etc/php-fpm.d/zz-www-overrides.conf:ro
