[www]
; 既定の pm.max_children=5 では、横断検索やトップ API が重なっただけで詰まりやすい。
; このアプリは短い PHP リクエストが多いので、worker を少し厚めにして待ち行列を減らす。
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500
catch_workers_output = yes
request_terminate_timeout = 120s
