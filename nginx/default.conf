map $http_user_agent $deny_heavy_bot {
    default 0;
    ~*(GPTBot|ChatGPT-User|CCBot|ClaudeBot|anthropic-ai|Googlebot|bingbot|Bytespider|YandexBot|AhrefsBot|SemrushBot|MJ12bot|DotBot|Amazonbot|facebookexternalhit|meta-externalagent|Slackbot|Twitterbot) 1;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Legacy flat reiki image paths
    location ^~ /data/reiki/kawasaki_images/ {
        rewrite ^/data/reiki/kawasaki_images/(.*)$ /data/reiki/14130-kawasaki-shi/images/$1 last;
    }

    # Legacy Kawasaki image directory before slug normalization
    location ^~ /data/reiki/kawasaki/images/ {
        rewrite ^/data/reiki/kawasaki/images/(.*)$ /data/reiki/14130-kawasaki-shi/images/$1 last;
    }

    # Serve static data files (images, etc.) - use ^~ for priority over regex
    location ^~ /data/ {
        alias /var/www/data/;
        try_files $uri =404;
    }

    # Serve images from /reiki/ path (for backwards compatibility)
    location ~ ^/reiki/.*\.(gif|jpg|jpeg|png)$ {
        rewrite ^/reiki/(.*)$ /data/reiki/14130-kawasaki-shi/images/$1 last;
    }

    # Serve static files directly (images, css, js)
    location ~* \.(gif|jpg|jpeg|png|css|js|svg|woff|woff2|ttf|eot|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # robots.txt は検索エンジンに動的ページの巡回抑制を伝える。
    location = /robots.txt {
        try_files /robots.txt =404;
    }

    # API は人間向け UI のための内部 JSON なので、クローラからは遮断する。
    location /api/ {
        if ($deny_heavy_bot) { return 403; }
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files $uri =404;
    }

    # /gijiroku/ は query-string ベースで使うため、未知のパスは PHP へ流さず 404 にする。
    location = /gijiroku/ {
        if ($deny_heavy_bot) { return 403; }
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        rewrite ^ /gijiroku/index.php?$query_string last;
    }

    location /gijiroku/ {
        if ($deny_heavy_bot) { return 403; }
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files $uri $uri/ =404;
    }

    # /reiki/ も query-string ベースで使うため、未知のファイル名を top/index.php へ流さない。
    location = /reiki/ {
        if ($deny_heavy_bot) { return 403; }
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        rewrite ^ /reiki/index.php?$query_string last;
    }

    location /reiki/ {
        if ($deny_heavy_bot) { return 403; }
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/boards/([a-z0-9_-]+)/?$ {
        rewrite ^/boards/([a-z0-9_-]+)/?$ /boards/index.php?slug=$1&$args last;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "include_path=.:/var/www/lib:/var/www/src";
        include fastcgi_params;
    }
}

