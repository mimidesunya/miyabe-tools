server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Serve static data files (images, etc.) - use ^~ for priority over regex
    location ^~ /data/ {
        alias /var/www/data/;
        try_files $uri =404;
    }

    # Serve images from /reiki/ path (for backwards compatibility)
    location ~ ^/reiki/.*\.(gif|jpg|jpeg|png)$ {
        rewrite ^/reiki/(.*)$ /data/reiki/kawasaki_images/$1 last;
    }

    # Serve static files directly (images, css, js)
    location ~* \.(gif|jpg|jpeg|png|css|js|svg|woff|woff2|ttf|eot|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/boards/([a-z0-9_-]+)/?$ {
        rewrite ^/boards/([a-z0-9_-]+)/?$ /boards/index.php?slug=$1&$args last;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
